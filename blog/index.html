<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC Affiliates | Local Blog</title>
<link rel="sitemap" type="application/xml" href="/sitemap.xml">
<style>
  :root {
    --primary: #00e5ff;
    --bg: #0a0a0a;
    --text: #f0f0f0;
    --card-bg: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 2rem; border-bottom: 2px solid var(--primary); }
  header h1 { color: var(--primary); font-size: 1.8rem; }
  header p { color: #aaa; margin-top: 0.3rem; font-size: 0.9rem; }
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
  .card { background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid #222; transition: transform 0.2s; }
  .card:hover { transform: translateY(-3px); }
  .card-body { padding: 1.5rem; }
  .card-tag { font-size: 0.7rem; text-transform: uppercase; color: var(--primary); letter-spacing: 1px; margin-bottom: 0.5rem; }
  .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.4; }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--primary); }
  .card-date { font-size: 0.8rem; color: #666; margin-top: 0.8rem; }
  footer { text-align: center; padding: 2rem; color: #444; font-size: 0.8rem; border-top: 1px solid #222; margin-top: 4rem; }
</style>
</head>
<body>
<header>
  <div class="container">
    <h1>ARC Affiliates</h1>
    <p>Local insights, tips, and resources for your community</p>
  </div>
</header>
<div class="container">
  <div class="grid" id="articles">
    <!-- articles injected here -->
  </div>
</div>
<footer>
  <p>Powered by ARC Affiliates &mdash; Local SEO &amp; Content Automation</p>
</footer>
</body>
</html>
